<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mundial FIFA 2026</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{background:#0a0f1e;font-family:system-ui,sans-serif;color:#fff}
body{display:flex;flex-direction:column;align-items:center}

.hero-t{font-size:16px;font-weight:900;letter-spacing:.08em;text-transform:uppercase;color:#f5c518;text-align:center;padding:12px 0 8px}

.layout{display:flex;width:100%;max-width:900px;gap:0;align-items:flex-start;padding:4px 0 2rem;overflow:hidden}
.sidebar{width:68px;min-width:68px;flex-shrink:0;display:flex;flex-direction:column;gap:2px;padding:4px 2px;position:sticky;top:8px;max-height:100vh;overflow-y:auto;scrollbar-width:none}
.sidebar::-webkit-scrollbar{display:none}
.stab{width:64px;min-height:32px;border-radius:6px;display:flex;align-items:center;justify-content:center;cursor:pointer;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.03);transition:all .15s;flex-shrink:0;padding:5px 4px}
.stab:hover{background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.2)}
.stab.on{background:rgba(245,197,24,.15);border-color:#f5c518}
.stab .fn{font-size:10px;color:rgba(255,255,255,.6);text-align:center;line-height:1.3;word-break:break-word}
.stab.on .fn{color:#f5c518;font-weight:600}

.main-panel{flex:1;display:flex;flex-direction:column;align-items:center;padding:0 4px}

.content{width:100%;display:flex;justify-content:center}
.panel{display:none;flex-direction:column;align-items:center;padding:0;width:100%}
.panel.on{display:flex}

.team-header{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.team-flag{width:36px;height:24px;border-radius:3px;overflow:hidden;box-shadow:0 2px 6px rgba(0,0,0,.4)}
.team-name{font-size:18px;font-weight:700;letter-spacing:.05em;text-transform:uppercase}
.team-form{font-size:12px;color:rgba(255,255,255,.45);margin-left:4px;font-weight:400;text-transform:none;letter-spacing:0}

.ley{display:flex;gap:14px;margin-bottom:10px;font-size:11px;color:rgba(255,255,255,.5)}
.ley-i{display:flex;align-items:center;gap:5px}
.ley-d{width:11px;height:11px;border-radius:50%;border:1.5px solid rgba(255,255,255,.4)}

.campo{position:relative;width:min(400px,calc(100vw - 144px));aspect-ratio:68/120;border-radius:10px;overflow:hidden;background:#2a7d45}
.campo::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(to bottom,transparent 0,transparent 49px,rgba(0,0,0,.1) 49px,rgba(0,0,0,.1) 98px);z-index:0}
.campo svg.ln{position:absolute;top:0;left:0;width:100%;height:100%;z-index:1}

.j{position:absolute;transform:translate(-50%,-50%);text-align:center;z-index:10}
.c{width:44px;height:44px;border-radius:50%;border:2px solid rgba(255,255,255,.55);display:flex;flex-direction:column;align-items:center;justify-content:center;margin:0 auto 2px}
.est .c{width:52px;height:52px;background:#f5c518!important;border-color:#fff;box-shadow:0 0 12px rgba(245,197,24,.6)}
.est .num{color:#1a1200!important}
.est .edad{color:rgba(26,18,0,.7)!important}
.num{font-size:13px;font-weight:700;color:#fff;line-height:1.1}
.edad{font-size:8px;font-weight:600;color:rgba(255,255,255,.85);line-height:1}
.jn{font-size:9.5px;font-weight:400;color:rgba(255,255,255,.8);white-space:nowrap;text-shadow:0 1px 3px #000;line-height:1.3}
.ja{font-size:10.5px;font-weight:600;color:#fff;white-space:nowrap;text-shadow:0 1px 3px #000;line-height:1.2}
.jc{font-size:8.5px;color:rgba(255,255,255,.55);white-space:nowrap;text-shadow:0 1px 2px #000}
.si{font-size:8px;color:#f5c518;line-height:1;margin-bottom:1px}

@media(max-width:400px){
  .sidebar{width:56px;min-width:56px}
  .stab{width:52px;font-size:9px}
  .stab .fn{font-size:8.5px}
  .campo{width:calc(100vw - 116px)}
  .c{width:38px;height:38px}
  .est .c{width:46px;height:46px}
  .num{font-size:11px}
  .ja{font-size:9px}
  .jn,.jc{font-size:7.5px}
}

.popup-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;align-items:center;justify-content:center}
.popup-overlay.show{display:flex}
.popup-box{background:#1a2540;border:1px solid rgba(255,255,255,.15);border-radius:14px;padding:20px;max-width:300px;width:90%;position:relative}
.popup-close{position:absolute;top:10px;right:14px;cursor:pointer;font-size:18px;color:rgba(255,255,255,.5);line-height:1}
.popup-close:hover{color:#fff}
.popup-name{font-size:16px;font-weight:700;color:#fff;margin-bottom:2px}
.popup-meta{font-size:11px;color:rgba(255,255,255,.45);margin-bottom:12px}
.popup-desc{font-size:13px;color:rgba(255,255,255,.85);line-height:1.6}
.popup-star{color:#f5c518;font-size:11px;margin-bottom:8px}
</style>
</head>
<body>

<div class="hero">
  <div class="hero-t">Equipos de FIFA</div>


</div>

<div class="layout">
  <div class="sidebar" id="sidebar-left"></div>
  <div class="main-panel">
    <div class="content" id="content"></div>
  </div>
  <div class="sidebar" id="sidebar-right"></div>
</div>

<script>
const TEAMS = {
  nor:{name:"Noruega",form:"4-3-3",gk:"#d4901a",out:"#4a5568",players:[
    {n:"1",fn:"Ørjan",ln:"Nyland",cl:"Sevilla",age:35,pos:"91%","left":"50%",gk:true,desc:"Guardameta titular; encargado de detener el arsenal ofensivo francés."},
    {n:"16",fn:"Marcus",ln:"Pedersen",cl:"Torino",age:25,pos:"74%","left":"87%",desc:"Lateral derecho con gran proyección para frenar las internadas extremas."},
    {n:"5",fn:"Kristoffer",ln:"Ajer",cl:"Brentford",age:28,pos:"74%","left":"63%",desc:"Defensa central y líder de la zaga, clave en el juego aéreo."},
    {n:"14",fn:"Torbjørn",ln:"Heggem",cl:"West Brom",age:27,pos:"74%","left":"37%",desc:"Defensa central enfocado en coberturas rápidas y mantener el bloque compacto."},
    {n:"6",fn:"David",ln:"Møller Wolfe",cl:"AZ Alkmaar",age:24,pos:"74%","left":"13%",desc:"Lateral izquierdo; responsable de contener las subidas veloces de los rivales."},
    {n:"8",fn:"Sander",ln:"Berge",cl:"Fulham",age:28,pos:"55%","left":"25%",desc:"Mediocampo defensivo encargado de la recuperación y corte de circuitos."},
    {n:"10",fn:"Martin",ln:"Ødegaard",cl:"Arsenal",age:27,pos:"55%","left":"50%",star:true,desc:"Capitán y motor del equipo; encargado de habilitar a los delanteros."},
    {n:"14",fn:"Fredrik",ln:"Aursnes",cl:"Benfica",age:30,pos:"55%","left":"75%",desc:"Interior mixto de gran despliegue físico para equilibrar transiciones."},
    {n:"7",fn:"Alexander",ln:"Sørloth",cl:"Atlético",age:30,pos:"28%","left":"20%",star:true,desc:"Extremo o segundo delantero; aporta potencia física y fija a los centrales."},
    {n:"20",fn:"Antonio",ln:"Nusa",cl:"RB Leipzig",age:21,pos:"28%","left":"80%",desc:"Extremo desequilibrante; encargado de desbordar mediante regate y velocidad."},
    {n:"9",fn:"Erling",ln:"Haaland",cl:"Man City",age:25,pos:"28%","left":"50%",star:true,desc:"Delantero centro estelar y la principal referencia de gol en ataque."},
  ]},
  fra:{name:"Francia",form:"4-2-3-1",gk:"#d4901a",out:"#1a3a6b",players:[
    {n:"16",fn:"Mike",ln:"Maignan",cl:"AC Milan",age:30,pos:"91%","left":"50%",gk:true,desc:"Cerrojo indiscutible bajo los tres palos; encargado de frenar la potencia de Erling Haaland."},
    {n:"5",fn:"Jules",ln:"Koundé",cl:"Barcelona",age:27,pos:"74%","left":"87%",desc:"Lateral derecho sólido; encargado de contener los desbordes veloces de Antonio Nusa."},
    {n:"17",fn:"William",ln:"Saliba",cl:"Arsenal",age:25,pos:"74%","left":"63%",desc:"Defensa central de élite; pilar principal en la marca física y persecución de los delanteros."},
    {n:"4",fn:"Dayot",ln:"Upamecano",cl:"Bayern",age:27,pos:"74%","left":"37%",desc:"Central rápido y expeditivo; responsable de las coberturas aéreas y anticipos en el área."},
    {n:"22",fn:"Theo",ln:"Hernández",cl:"Al-Hilal",age:28,pos:"74%","left":"13%",desc:"Lateral izquierdo sumamente ofensivo; clave para explotar la banda con velocidad y centros."},
    {n:"8",fn:"Aurélien",ln:"Tchouaméni",cl:"Real Madrid",age:26,pos:"57%","left":"35%",desc:"Mediocampo de contención; el encargado del equilibrio táctico y de cortar el juego de Ødegaard."},
    {n:"14",fn:"Adrien",ln:"Rabiot",cl:"AC Milan",age:31,pos:"57%","left":"65%",desc:"Interior mixto de experiencia; aporta despliegue, juego aéreo y distribución en transiciones."},
    {n:"11",fn:"Ousmane",ln:"Dembélé",cl:"PSG",age:29,pos:"38%","left":"20%",desc:"Extremo izquierdo impredecible; aporta un desequilibrio letal en el uno contra uno por las bandas."},
    {n:"20",fn:"Désiré",ln:"Doué",cl:"PSG",age:21,pos:"38%","left":"50%",desc:"Mediapunta o enganche joven con tremenda visión; encargado de conectar el medio con la delantera."},
    {n:"7",fn:"Michael",ln:"Olise",cl:"Bayern",age:24,pos:"38%","left":"80%",desc:"Extremo derecho creativo; destaca por su gran capacidad de regate hacia el centro y asistencias."},
    {n:"10",fn:"Kylian",ln:"Mbappé",cl:"Real Madrid",age:27,pos:"22%","left":"50%",star:true,desc:"Capitán, delantero centro estelar y máxima figura; letal buscando el espacio y definiendo."},
  ]},
};
const LINES_SVG = `<svg class="ln" viewBox="0 0 500 770" xmlns="http://www.w3.org/2000/svg"><rect x="28" y="28" width="444" height="714" rx="4" fill="none" stroke="rgba(255,255,255,.35)" stroke-width="2"/><line x1="28" y1="385" x2="472" y2="385" stroke="rgba(255,255,255,.35)" stroke-width="2"/><circle cx="250" cy="385" r="72" fill="none" stroke="rgba(255,255,255,.35)" stroke-width="2"/><circle cx="250" cy="385" r="5" fill="rgba(255,255,255,.4)"/><rect x="108" y="28" width="284" height="122" fill="none" stroke="rgba(255,255,255,.35)" stroke-width="2"/><rect x="172" y="28" width="156" height="56" fill="none" stroke="rgba(255,255,255,.35)" stroke-width="2"/><rect x="108" y="620" width="284" height="122" fill="none" stroke="rgba(255,255,255,.35)" stroke-width="2"/><rect x="172" y="686" width="156" height="56" fill="none" stroke="rgba(255,255,255,.35)" stroke-width="2"/><rect x="204" y="736" width="92" height="26" fill="none" stroke="rgba(255,255,255,.45)" stroke-width="2"/><rect x="204" y="8" width="92" height="26" fill="none" stroke="rgba(255,255,255,.45)" stroke-width="2"/><path d="M128 620 A124 124 0 0 0 372 620" fill="none" stroke="rgba(255,255,255,.25)" stroke-width="1.5"/><path d="M128 150 A124 124 0 0 1 372 150" fill="none" stroke="rgba(255,255,255,.25)" stroke-width="1.5"/></svg>`;

function buildPanel(code) {
  const t = TEAMS[code];
  const players = t.players.map(p => {
    const isStar = p.star;
    const bg = p.gk ? t.gk : (isStar ? '#f5c518' : t.out);
    const numColor = isStar ? '#1a1200' : '#fff';
    const edadColor = isStar ? 'rgba(26,18,0,.7)' : 'rgba(255,255,255,.85)';
    const size = isStar ? '52px' : '44px';
    const shadow = isStar ? 'box-shadow:0 0 12px rgba(245,197,24,.6);' : '';
    const stars = isStar ? `<div class="si">★★★</div>` : '';
    const descSafe = (p.desc||'').replace(/'/g,"\\'");
    return `<div class="j${isStar?' est':''}" style="left:${p.left};top:${p.pos};cursor:pointer" onclick="openPopup('${p.fn}','${p.ln}','${p.cl}',${p.age},'${descSafe}',${p.star||false})">
      <div class="c" style="background:${bg};width:${size};height:${size};${shadow}">
        <span class="num" style="color:${numColor}">${p.n}</span>
        <span class="edad" style="color:${edadColor}">${p.age}a</span>
      </div>
      ${stars}
      <div class="jn">${p.fn}</div>
      <div class="ja">${p.ln}</div>
      <div class="jc">${p.cl}</div>
    </div>`;
  }).join('');

  return `<div style="display:flex;flex-direction:column;align-items:center;width:100%">
    <div class="campo">${LINES_SVG}${players}</div>
    <div class="ley" style="justify-content:center;margin-top:10px">
      <div class="ley-i"><div class="ley-d" style="background:#f5c518;border-color:#f5c518"></div>Estrella</div>
      <div class="ley-i"><div class="ley-d" style="background:${t.out}"></div>Titular</div>
      <div class="ley-i"><div class="ley-d" style="background:#d4901a;border-color:#d4901a"></div>Portero</div>
    </div>
  </div>`;
}

const COUNTRIES = [
  {c:'nor',n:'Noruega'},
  {c:'fra',n:'Francia'},
];

function buildSidebar(id, list) {
  const el = document.getElementById(id);
  el.innerHTML = list.map(({c,n}) =>
    `<div class="stab" id="stab-${c}" onclick="show('${c}')" title="${n}">
      <div class="fn">${n}</div>
    </div>`
  ).join('');
}

buildSidebar('sidebar-left', COUNTRIES);
buildSidebar('sidebar-right', []);

function show(code) {
  document.querySelectorAll('.stab').forEach(e=>e.classList.remove('on'));
  const t = document.getElementById('stab-'+code);
  if(t){ t.classList.add('on'); t.scrollIntoView({block:'nearest'}); }
  document.getElementById("content").innerHTML = buildPanel(code);
}

show('nor');

function openPopup(fn, ln, cl, age, desc, star) {
  document.getElementById('popup-name').textContent = fn + ' ' + ln;
  document.getElementById('popup-meta').textContent = age + ' años · ' + cl;
  document.getElementById('popup-star').textContent = star ? '★★★ Estrella' : '';
  document.getElementById('popup-desc').textContent = desc || '';
  document.getElementById('popup').classList.add('show');
}
function closePopup(e) {
  if(e.target === document.getElementById('popup')) document.getElementById('popup').classList.remove('show');
}
</script>
<div class="popup-overlay" id="popup" onclick="closePopup(event)">
  <div class="popup-box">
    <div class="popup-close" onclick="document.getElementById('popup').classList.remove('show')">✕</div>
    <div class="popup-name" id="popup-name"></div>
    <div class="popup-meta" id="popup-meta"></div>
    <div class="popup-star" id="popup-star"></div>
    <div class="popup-desc" id="popup-desc"></div>
  </div>
</div>
</body>
</html>
