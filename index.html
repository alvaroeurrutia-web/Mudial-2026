<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{background:#0a0f1e;font-family:system-ui,sans-serif;color:#fff}
body{display:flex;flex-direction:column;align-items:center}

.hero-t{font-size:16px;font-weight:900;letter-spacing:.08em;text-transform:uppercase;color:#f5c518;text-align:center;padding:12px 0 8px}

.layout{display:flex;width:100%;max-width:900px;gap:0;align-items:flex-start;padding:4px 0 2rem;overflow:hidden}
.sidebar{width:68px;min-width:68px;flex-shrink:0;display:flex;flex-direction:column;gap:2px;padding:4px 2px;position:sticky;top:8px;max-height:100vh;overflow-y:auto;scrollbar-width:none}
.sidebar::-webkit-scrollbar{display:none}
.stab{width:64px;min-height:32px;border-radius:6px;display:flex;align-items:center;justify-content:center;cursor:pointer;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.03);transition:all .15s;flex-shrink:0;padding:5px 4px}
.stab:hover{background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.2)}
.stab.on{background:rgba(245,197,24,.15);border-color:#f5c518}
.stab .fn{font-size:10px;color:rgba(255,255,255,.6);text-align:center;line-height:1.3;word-break:break-word}
.stab.on .fn{color:#f5c518;font-weight:600}

.main-panel{flex:1;display:flex;flex-direction:column;align-items:center;padding:0 4px}

.content{width:100%;display:flex;justify-content:center}
.panel{display:none;flex-direction:column;align-items:center;padding:0;width:100%}
.panel.on{display:flex}

.team-header{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.team-flag{width:36px;height:24px;border-radius:3px;overflow:hidden;box-shadow:0 2px 6px rgba(0,0,0,.4)}
.team-name{font-size:18px;font-weight:700;letter-spacing:.05em;text-transform:uppercase}
.team-form{font-size:12px;color:rgba(255,255,255,.45);margin-left:4px;font-weight:400;text-transform:none;letter-spacing:0}

.ley{display:flex;gap:14px;margin-bottom:10px;font-size:11px;color:rgba(255,255,255,.5)}
.ley-i{display:flex;align-items:center;gap:5px}
.ley-d{width:11px;height:11px;border-radius:50%;border:1.5px solid rgba(255,255,255,.4)}

.campo{position:relative;width:min(400px,calc(100vw - 144px));aspect-ratio:68/105;border-radius:10px;overflow:hidden;background:#2a7d45}
.campo::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(to bottom,transparent 0,transparent 49px,rgba(0,0,0,.1) 49px,rgba(0,0,0,.1) 98px);z-index:0}
.campo svg.ln{position:absolute;top:0;left:0;width:100%;height:100%;z-index:1}

.j{position:absolute;transform:translate(-50%,-50%);text-align:center;z-index:10}
.c{width:44px;height:44px;border-radius:50%;border:2px solid rgba(255,255,255,.55);display:flex;flex-direction:column;align-items:center;justify-content:center;margin:0 auto 2px}
.est .c{width:52px;height:52px;background:#f5c518!important;border-color:#fff;box-shadow:0 0 12px rgba(245,197,24,.6)}
.est .num{color:#1a1200!important}
.est .edad{color:rgba(26,18,0,.7)!important}
.num{font-size:13px;font-weight:700;color:#fff;line-height:1.1}
.edad{font-size:8px;font-weight:600;color:rgba(255,255,255,.85);line-height:1}
.jn{font-size:9.5px;font-weight:400;color:rgba(255,255,255,.8);white-space:nowrap;text-shadow:0 1px 3px #000;line-height:1.3}
.ja{font-size:10.5px;font-weight:600;color:#fff;white-space:nowrap;text-shadow:0 1px 3px #000;line-height:1.2}
.jc{font-size:8.5px;color:rgba(255,255,255,.55);white-space:nowrap;text-shadow:0 1px 2px #000}
.si{font-size:8px;color:#f5c518;line-height:1;margin-bottom:1px}

@media(max-width:400px){
  .sidebar{width:56px;min-width:56px}
  .stab{width:52px;font-size:9px}
  .stab .fn{font-size:8.5px}
  .campo{width:calc(100vw - 116px)}
  .c{width:38px;height:38px}
  .est .c{width:46px;height:46px}
  .num{font-size:11px}
  .ja{font-size:9px}
  .jn,.jc{font-size:7.5px}
}
</style>
</head>

function buildPanel(code) {
  const t = TEAMS[code];
  const players = t.players.map(p => {
    const isStar = p.star;
    const bg = p.gk ? t.gk : (isStar ? '#f5c518' : t.out);
    const numColor = isStar ? '#1a1200' : '#fff';
    const edadColor = isStar ? 'rgba(26,18,0,.7)' : 'rgba(255,255,255,.85)';
    const size = isStar ? '52px' : '44px';
    const shadow = isStar ? 'box-shadow:0 0 12px rgba(245,197,24,.6);' : '';
    const stars = isStar ? `<div class="si">★★★</div>` : '';
    return `<div class="j${isStar?' est':''}" style="left:${p.left};top:${p.pos}">
      <div class="c" style="background:${bg};width:${size};height:${size};${shadow}">
        <span class="num" style="color:${numColor}">${p.n}</span>
        <span class="edad" style="color:${edadColor}">${p.age}a</span>
      </div>
      ${stars}
      <div class="jn">${p.fn}</div>
      <div class="ja">${p.ln}</div>
      <div class="jc">${p.cl}</div>
    </div>`;
  }).join('');

  return `<div style="display:flex;flex-direction:column;align-items:center;width:100%">
    <div class="campo">${LINES_SVG}${players}</div>
    <div class="ley" style="justify-content:center;margin-top:10px">
      <div class="ley-i"><div class="ley-d" style="background:#f5c518;border-color:#f5c518"></div>Estrella</div>
      <div class="ley-i"><div class="ley-d" style="background:${t.out}"></div>Titular</div>
      <div class="ley-i"><div class="ley-d" style="background:#d4901a;border-color:#d4901a"></div>Portero</div>
    </div>
  </div>`;
}

function buildSidebar(id, list) {
  const el = document.getElementById(id);
  el.innerHTML = list.map(({c,f,n}) =>
    `<div class="stab" id="stab-${c}" onclick="show('${c}')" title="${n}">
      <div class="fn">${n}</div>
    </div>`
  ).join('');
}

function show(code) {
  document.querySelectorAll('.stab').forEach(e=>e.classList.remove('on'));
  const t = document.getElementById('stab-'+code);
  if(t){ t.classList.add('on'); t.scrollIntoView({block:'nearest'}); }
  document.getElementById("content").innerHTML = buildPanel(code);
}
